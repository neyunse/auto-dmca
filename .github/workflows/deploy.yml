name: Build & Deploy DMCA System

on:
  push:
    branches: ["master"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.TOKEN }}
      
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.worker
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/dmca-worker:latest
            ghcr.io/${{ github.repository_owner }}/dmca-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Dashboard
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.dashboard
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/dmca-dashboard:latest
            ghcr.io/${{ github.repository_owner }}/dmca-dashboard:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max