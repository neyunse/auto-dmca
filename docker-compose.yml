version: '3.8'

services:
  # Node.js Worker & Sockets
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - PORT=4000
    ports:
      - "4000:4000"
    restart: unless-stopped

  # Next.js Dashboard
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - NEXT_PUBLIC_SOCKET_URL=${NEXT_PUBLIC_SOCKET_URL:-http://localhost:4000}
    ports:
      - "3000:3000"
    depends_on:
      - worker
    restart: unless-stopped
